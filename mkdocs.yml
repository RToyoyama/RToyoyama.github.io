# ─────────────────────────────────────────────
# INFORMAÇÕES DO SITE
# ─────────────────────────────────────────────
site_name: "Renan Toyoyama | Data Portfolio"
site_description: "Portfólio de projetos de Engenharia e Ciência de Dados"
site_author: "Renan Toyoyama"
site_url: "https://RToyoyama.github.io/"

repo_name: "RToyoyama/RToyoyama.github.io"
repo_url: "https://github.com/RToyoyama/RToyoyama.github.io"

# ─────────────────────────────────────────────
# TEMA VISUAL
# ─────────────────────────────────────────────
theme:
  name: material          # tema Material for MkDocs
  language: pt-BR
  palette:
    # Modo escuro (padrão ao abrir)
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Modo claro
    # Modo claro (ao clicar no botão)
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Modo escuro
  font:
    text: IBM Plex Sans    # fonte principal
    code: JetBrains Mono   # fonte para blocos de código
  features:
    - navigation.tabs        # menu em abas no topo
    - navigation.indexes     # cada seção pode ter sua própria index
    - navigation.top         # botão "voltar ao topo"
    - navigation.instant     # navegação sem recarregar a página
    - content.code.copy      # botão de copiar em blocos de código
    - search.highlight       # destaca o termo pesquisado
    - search.suggest         # autocomplete na busca

# ─────────────────────────────────────────────
# NAVEGAÇÃO (menu do site)
# ─────────────────────────────────────────────
nav:
  - Início: index.md
  - Projetos:
    - projetos/index.md
    - Currency ETL Pipeline: projetos/currency-etl-pipeline.md
    - Torre de Hanói: projetos/torre-hanoi.md
    - EduConnect SGE: projetos/educonnect-sge.md
    - Árvore de Decisão: projetos/arvore-decisao.md
    - Credit Score Naive Bayes: projetos/credit-score-naivebayes.md
    - Análise de Vendas: projetos/supermarket-sales.md
    - Regressão Imobiliária: projetos/regressao-imobiliaria.md
  - Skills: skills.md
  - Contato: contato.md

# ─────────────────────────────────────────────
# PLUGINS
# ─────────────────────────────────────────────
plugins:
  - search:
      lang: pt

# ─────────────────────────────────────────────
# EXTENSÕES DO MARKDOWN
# ─────────────────────────────────────────────
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true   # links para linhas específicas de código
  - pymdownx.superfences      # blocos de código aninhados
  - pymdownx.inlinehilite     # highlight inline: `#!python print()`
  - pymdownx.tabbed:
      alternate_style: true   # abas horizontais no conteúdo
  - admonition                # blocos !!! tip, !!! warning, !!! info
  - pymdownx.details          # blocos colapsáveis
  - attr_list                 # adiciona classes CSS em elementos
  - md_in_html                # Markdown dentro de HTML (para os cards)
  - tables                    # tabelas Markdown
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# ─────────────────────────────────────────────
# RODAPÉ E REDES SOCIAIS
# ─────────────────────────────────────────────
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/RToyoyama
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/renan-toyoyama-3b0165308/
    - icon: fontawesome/solid/envelope
      link: mailto:renantoyoyama@gmail.com

copyright: "© 2025 Renan Toyoyama · Engenharia & Ciência de Dados"